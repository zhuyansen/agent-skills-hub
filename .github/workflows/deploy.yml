name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Sync Skills Data"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-search-engines:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Fetch live sitemaps
        run: |
          mkdir -p sitemaps
          for f in sitemap-static sitemap-categories sitemap-top sitemap-mid sitemap-rest; do
            curl -sL "https://agentskillshub.top/${f}.xml" -o "sitemaps/${f}.xml" 2>/dev/null || true
          done

      - name: Submit to IndexNow (Bing + Yandex)
        run: |
          INDEXNOW_KEY="a52f1d0890354e5b84d0e4e1ba17bd84"

          # Extract all URLs from downloaded sitemaps
          URLS=$(grep -oP '(?<=<loc>)[^<]+' sitemaps/sitemap*.xml 2>/dev/null || true)

          if [ -z "$URLS" ]; then
            echo "No sitemap URLs found, skipping IndexNow"
            exit 0
          fi

          URL_COUNT=$(echo "$URLS" | wc -l | tr -d ' ')
          echo "Found $URL_COUNT URLs, submitting in batches of 2000..."

          # Submit in batches of 2000 (IndexNow limit is 10000)
          BATCH=0
          echo "$URLS" | while mapfile -t -n 2000 CHUNK && [ ${#CHUNK[@]} -gt 0 ]; do
            BATCH=$((BATCH+1))
            BATCH_COUNT=${#CHUNK[@]}
            echo "Batch $BATCH: $BATCH_COUNT URLs"

            # Build JSON payload via file to avoid argument list too long
            URL_JSON=$(printf '%s\n' "${CHUNK[@]}" | jq -R -s 'split("\n") | map(select(length > 0))')
            cat > /tmp/indexnow_payload.json <<EOJSON
          {"host":"agentskillshub.top","key":"${INDEXNOW_KEY}","keyLocation":"https://agentskillshub.top/${INDEXNOW_KEY}.txt","urlList":${URL_JSON}}
          EOJSON

            # Submit to Yandex
            YANDEX_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "https://yandex.com/indexnow" \
              -H "Content-Type: application/json; charset=utf-8" -d @/tmp/indexnow_payload.json)
            echo "  Yandex: HTTP $YANDEX_CODE"

            # Submit to Bing
            BING_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "https://www.bing.com/indexnow" \
              -H "Content-Type: application/json; charset=utf-8" -d @/tmp/indexnow_payload.json)
            echo "  Bing: HTTP $BING_CODE"
          done

          echo "IndexNow submission complete."
