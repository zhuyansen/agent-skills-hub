name: Weekly Newsletter

on:
  schedule:
    # Every Monday at 9:00 AM UTC (5:00 PM Beijing Time)
    - cron: "0 9 * * 1"
  workflow_dispatch: # Manual trigger for testing

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send weekly newsletter
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python newsletter_runner.py

  notify-failure:
    needs: send-newsletter
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Newsletter send failed: ${new Date().toISOString().slice(0, 10)}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'newsletter-failure',
              per_page: 1,
            });
            if (existing.data.length > 0) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `Newsletter workflow failed. [View run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['newsletter-failure'],
            });
