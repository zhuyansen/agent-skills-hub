name: Stripe order poll

on:
  schedule:
    - cron: "7,37 * * * *" # every 30 min (offset to dodge top-of-hour queue)
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Poll Stripe for new paid orders
        env:
          STRIPE_RESTRICTED_KEY: ${{ secrets.STRIPE_RESTRICTED_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python ops/stripe/poll_stripe.py
