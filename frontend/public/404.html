<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Agent Skills Hub</title>
  <script>
    // GitHub Pages SPA redirect: converts path to query param and redirects to index.html
    var pathSegmentsToKeep = 0; // Custom domain: agentskillshub.top (root)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
  <script defer data-domain="agentskillshub.top" src="https://plausible.io/js/script.js"></script>
</head>
<body></body>
</html>
